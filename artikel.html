<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baca Artikel - Olikom Indonesia</title>
    <link rel="icon" href="foto/Logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { background-color: #f9f9f9; }
        .artikel-container { 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 30px; 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .btn-kembali { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: #555; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 15px;
            transition: 0.3s;
        }
        .btn-kembali:hover { color: #FFC107; }
        
        .detail-judul { font-size: 32px; color: #222; margin-bottom: 10px; line-height: 1.3; }
        .detail-tanggal { color: #888; font-size: 14px; margin-bottom: 25px; display: block; font-weight: 600;}
        .detail-img { 
            width: 100%; 
            max-height: 450px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 30px; 
        }
        /* white-space: pre-wrap sangat penting agar 'Enter' / paragraf dari admin terbaca! */
        .detail-isi { font-size: 16px; line-height: 1.8; color: #444; white-space: pre-wrap; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo-container" style="display: flex; align-items: center; gap: 15px;">
            <a href="admin.html" style="display: flex; align-items: center;">
                <img src="foto/Logo.png" alt="Logo" class="logo-img-header" style="height: 75px; width: auto; object-fit: contain;">
            </a>
            
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <h1 class="logo-text" style="margin: 0; line-height: 1; font-size: 26px;">Olikom<span>Indonesia</span></h1>
                
                <span style="font-size: 9.5px; font-weight: 1000; color: #555; letter-spacing: 0.7px; margin-top: 4px; white-space: nowrap;">
                    Industrial Solution, Engineered Excellent
                </span>
            </div>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="katalog.html">Katalog</a></li>
            </ul>
        </nav>
    </header>

    <div class="artikel-container">
        <a href="index.html#blog" class="btn-kembali">&larr; Kembali ke Beranda</a>
        
        <div id="kontenArtikel">
            <h2 style="text-align: center; color: #888; margin-top: 50px;">Memuat Artikel...</h2>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKznFBiGk9jnXTR3ddRdIlhYuVAduqc80",
            authDomain: "olikom-indonesia.firebaseapp.com",
            projectId: "olikom-indonesia",
            storageBucket: "olikom-indonesia.firebasestorage.app",
            messagingSenderId: "207771016540",
            appId: "1:207771016540:web:9679cc56336fddb9077599"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function muatDetailArtikel() {
            // 1. Ambil ID dari URL (contoh: artikel.html?id=xyz123)
            const urlParams = new URLSearchParams(window.location.search);
            const idArtikel = urlParams.get('id');
            const wadah = document.getElementById('kontenArtikel');

            if (!idArtikel) {
                wadah.innerHTML = "<h2 style='color: red; text-align: center;'>Artikel tidak ditemukan!</h2>";
                return;
            }

            try {
                // 2. Minta data ke Firebase khusus untuk ID tersebut
                const docRef = doc(db, "artikel_blog", idArtikel);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // 3. Tampilkan datanya secara penuh
                    wadah.innerHTML = `
                        <h1 class="detail-judul">${data.judul}</h1>
                        <span class="detail-tanggal">Diterbitkan pada: ${data.tanggal}</span>
                        <img src="${data.gambar}" class="detail-img" alt="${data.judul}">
                        <div class="detail-isi">${data.isi}</div>
                    `;
                } else {
                    wadah.innerHTML = "<h2 style='color: red; text-align: center;'>Artikel sudah dihapus atau tidak tersedia.</h2>";
                }
            } catch (error) {
                console.error("Gagal memuat:", error);
                wadah.innerHTML = "<h2 style='color: red; text-align: center;'>Terjadi kesalahan jaringan.</h2>";
            }
        }

        // Panggil fungsinya
        muatDetailArtikel();
    </script>
</body>
</html>
