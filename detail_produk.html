<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - Olikom Indonesia</title>
    <link rel="icon" href="foto/Logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { background-color: #f9f9f9; }
        .detail-container { 
            max-width: 1000px; 
            margin: 40px auto; 
            padding: 40px; 
            background: #fff; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        @media (max-width: 768px) {
            .detail-container { grid-template-columns: 1fr; padding: 20px;}
        }
        
        .btn-kembali { 
            display: inline-block; margin-bottom: 20px; color: #555; text-decoration: none; font-weight: 600; font-size: 15px; transition: 0.3s;
        }
        .btn-kembali:hover { color: #FFC107; }
        
        .gambar-produk { width: 100%; height: 400px; object-fit: contain; border: 1px solid #eee; border-radius: 12px; padding: 10px;}
        .kategori-badge { background: #FFC107; color: #222; padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: 700; display: inline-block; margin-bottom: 15px; text-transform: uppercase;}
        .nama-produk { font-size: 32px; color: #222; margin-bottom: 20px; line-height: 1.2; font-weight: 700; }
        
        /* Area tempat teks dari teks editor (quill) akan dimunculkan */
        .deskripsi-lengkap { font-size: 15px; color: #444; line-height: 1.8; margin-bottom: 30px;}
        
        .btn-pesan-besar { background: #25d366; color: white; padding: 15px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);}
        .btn-pesan-besar:hover { background: #128C7E; transform: translateY(-3px);}
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo-container" style="display: flex; align-items: center; gap: 12px;">
            <a href="index.html"><img src="foto/Logo.png" alt="Logo" class="logo-img-header"></a>
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <h1 class="logo-text" style="margin: 0; line-height: 1.1;">Olikom<span>Indonesia</span></h1>
                <span style="font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px;">Industrial Solution, Engineered Excellent</span>
            </div>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="katalog.html">Katalog</a></li>
            </ul>
        </nav>
    </header>

    <div style="max-width: 1000px; margin: 40px auto 0 auto; padding: 0 20px;">
        <a href="katalog.html" class="btn-kembali">&larr; Kembali ke Katalog</a>
    </div>

    <div class="detail-container" id="kontenProduk">
        <div style="grid-column: 1 / -1; text-align: center; padding: 50px 0;">
            <h2 style="color: #888;">⏳ Mengambil data produk...</h2>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKznFBiGk9jnXTR3ddRdIlhYuVAduqc80",
            authDomain: "olikom-indonesia.firebaseapp.com",
            projectId: "olikom-indonesia",
            storageBucket: "olikom-indonesia.firebasestorage.app",
            messagingSenderId: "207771016540",
            appId: "1:207771016540:web:9679cc56336fddb9077599"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function muatDetailProduk() {
            // 1. Ambil ID produk dari URL
            const urlParams = new URLSearchParams(window.location.search);
            const idProduk = urlParams.get('id');
            const wadah = document.getElementById('kontenProduk');

            if (!idProduk) {
                wadah.innerHTML = "<h2 style='color: red; text-align: center; grid-column: 1/-1;'>Produk tidak ditemukan!</h2>";
                return;
            }

            try {
                // 2. Tarik data spesifik dari tabel "katalog_produk"
                const docRef = doc(db, "katalog_produk", idProduk);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const teksDeskripsiHtml = data.Deskripsi || data.deskripsi || "Belum ada deskripsi untuk produk ini.";
                    const kategoriProduk = data.kategori || "Produk Olikom";

                    // 3. Render HTML
                    wadah.innerHTML = `
                        <div>
                            <img src="${data.gambar}" class="gambar-produk" alt="${data.nama}">
                        </div>
                        <div>
                            <span class="kategori-badge">${kategoriProduk}</span>
                            <h1 class="nama-produk">${data.nama}</h1>
                            
                            <h3 style="font-size: 16px; margin-bottom: 10px; color: #222;">Spesifikasi / Deskripsi Lengkap:</h3>
                            <div class="deskripsi-lengkap">${teksDeskripsiHtml}</div>
                            
                            <hr style="border: none; border-top: 1px solid #eee; margin: 30px 0;">
                            
                            <a href="https://wa.me/6285727250080?text=Halo%20Olikom,%20saya%20tertarik%20dengan%20produk%20${data.nama}" target="_blank" class="btn-pesan-besar">
                                Pesan Sekarang via WhatsApp
                            </a>
                        </div>
                    `;
                } else {
                    wadah.innerHTML = "<h2 style='color: red; text-align: center; grid-column: 1/-1;'>Produk sudah dihapus atau tidak tersedia.</h2>";
                }
            } catch (error) {
                console.error("Gagal memuat:", error);
                wadah.innerHTML = "<h2 style='color: red; text-align: center; grid-column: 1/-1;'>Terjadi kesalahan jaringan.</h2>";
            }
        }

        muatDetailProduk();
    </script>
</body>
</html>
